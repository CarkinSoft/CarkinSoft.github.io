<!-- 1. Write code to display a dropdown menu with the following choices/options: Ocean, Clouds, Flours, Mountains, Space
    
     2. Write a JS program to display an image corresponding to the dropdown menu selection. Use one of the Web APIs listed below. Display the first image in the array, use the webformatURL property

     3. Modify your program to display a random image (by default, the Web API returns 50 images; select one at random).

     4. Modify your program to list the dropdown menu options in random order. -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>Image API</title>
        <link rel="stylesheet" href="css/stylesheet.css">
    </head>
    <style>
        #imageDisplay img {
            width: 200px;
        }
    </style>
    <body>

        <div>
            <select>
            <option value="none">-- choose one --</option>
            <option value="Ocean">Ocean</option>
            <option value="Clouds">Clouds</option>
            <option value="Flowers">Flowers</option>
            <option value="Mountains">Mountains</option>
            <option value="Space">Space</option>
            </select>
        </div>

    <span id="imageDisplay">
    </span>

    </body>
    <script src="js/script.js"></script>
</html>
