<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>US Geography Quiz</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/stylesheet.css">
</head>

<body class="text-center">
<header class="hero">
    <h1 class="p-4 bg-info-subtle">US Geography Quiz</h1>
    <p class="subtext">5 questions, 20 points each, Score over 80% to pass</p>
</header>

<main class="container quiz-card">
    <div id="validationFdbk" class="my-3"></div>

    <!-- Question1 Text -->
    <section class="question-box">
        <h3><span id="markImg1" class="mark-slot"></span>1) What is the capital of California?</h3>
        <input id="q1" type="text" class="form-control mx-auto w-75" placeholder="Type your answer..." />
        <div id="q1Feedback" class="feedback"></div>
    </section>
    <br>

    <!-- Question2 Dropdown -->
    <section class="question-box">
        <h3><span id="markImg2" class="mark-slot"></span>2) Which state is the largest by area?</h3>
        <select id="q2" class="form-select mx-auto w-75">
            <option value="">-- choose one --</option>
            <option value="Alaska">Alaska</option>
            <option value="Texas">Texas</option>
            <option value="California">California</option>
            <option value="Florida">Florida</option>
        </select>
        <div id="q2Feedback" class="feedback"></div>
    </section>
    <br>

    <!-- Question 3 Checkboxes -->
    <section class="question-box">
        <h3><span id="markImg3" class="mark-slot"></span>3) Which presidents are carved into Mount Rushmore?</h3>

        <div class="choices">
            <input type="checkbox" id="Washington" />
            <label for="Washington">George Washington</label>

            <input type="checkbox" id="Jefferson" />
            <label for="Jefferson">Thomas Jefferson</label>

            <input type="checkbox" id="Lincoln" />
            <label for="Lincoln">Abraham Lincoln</label>

            <input type="checkbox" id="Roosevelt" />
            <label for="Roosevelt">Theodore Roosevelt</label>

            <input type="checkbox" id="Franklin" />
            <label for="Franklin">Benjamin Franklin</label>

            <input type="checkbox" id="Jackson" />
            <label for="Jackson">Andrew Jackson</label>
        </div>

        <div id="q3Feedback" class="feedback"></div>
    </section>
    <br>

    <!-- Question 4 Radio-->
    <section class="question-box">
        <h3><span id="markImg4" class="mark-slot"></span>4) What is the smallest US state?</h3>
        <div id="q4Choices" class="choices radio-choices"></div>
        <div id="q4Feedback" class="feedback"></div>
    </section>
    <br>

    <!-- Question 5 Number input -->
    <section class="question-box">
        <h3><span id="markImg5" class="mark-slot"></span>5) How many US states are there?</h3>
        <input id="q5" type="number" class="form-control mx-auto w-50" min="1" max="60" placeholder="Enter a number" />
        <div id="q5Feedback" class="feedback"></div>
    </section>
    <br>

    <button id="submitBtn" class="btn btn-primary btn-lg my-3">Submit Quiz</button>
    <div id="totalScore" class="score-box"></div>
    <div id="congratsMsg" class="congrats-box"></div>
<!--    <div id="totalAttempts" class="attempts-box"></div>-->
</main>

<script src="js/script.js"></script>
</body>
</html>
